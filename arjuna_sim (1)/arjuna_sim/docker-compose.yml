version: "3.8"

services:
  arjuna_sim:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: arjuna_sim:latest
    container_name: arjuna_sim

    # Port mappings
    ports:
      - "6080:6080"     # noVNC browser UI  → http://YOUR_EC2_IP:6080/vnc.html
      - "5900:5900"     # Raw VNC (optional, use a VNC client)
      - "11311:11311"   # ROS Master URI

    # Allow GUI rendering inside container
    environment:
      - DISPLAY=:1
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_HOSTNAME=localhost

    # GPU passthrough (optional, speeds up Gazebo rendering on EC2 GPU instances)
    # Uncomment if your EC2 instance has a GPU and nvidia-container-toolkit installed:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    # Shared memory for faster sensor data (Gazebo benefits from this)
    shm_size: "512m"

    # Restart policy
    restart: unless-stopped

    # Mount your code workspace for live editing without rebuilding
    volumes:
      - ./my_robot_code:/catkin_ws/src/my_robot_code:rw

    stdin_open: true
    tty: true
